<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edge Vision Command Deck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="background-glow glow-a"></div>
    <div class="background-glow glow-b"></div>

    <main class="layout">
      <header class="hero">
        <div>
          <p class="eyebrow">Industrial Safety Monitoring</p>
          <h1>Edge Vision Command Deck</h1>
          <p class="subtitle">Flujo en vivo de detecciones, alertas y respuesta automática.</p>
        </div>
        <div class="status-pill" id="stream-status">Conectando...</div>
      </header>

      <section class="cards" id="stats-cards">
        <article class="card reveal">
          <h2>Eventos</h2>
          <p id="events-total">0</p>
        </article>
        <article class="card reveal delay-1">
          <h2>Alertas</h2>
          <p id="alerts-total">0</p>
        </article>
        <article class="card reveal delay-2">
          <h2>Críticas</h2>
          <p id="critical-total">0</p>
        </article>
        <article class="card reveal delay-3">
          <h2>Altas</h2>
          <p id="high-total">0</p>
        </article>
      </section>

      <section class="panels">
        <article class="panel reveal delay-2">
          <h3>Contexto</h3>
          <div class="kv-list">
            <div><span>Cámara</span><strong id="camera-id">-</strong></div>
            <div><span>Último evento</span><strong id="last-event">-</strong></div>
          </div>

          <h3 class="camera-title">Camara en Vivo</h3>
          <div class="camera-wrapper">
            <img id="camera-frame" alt="Vista de camara" />
            <p id="frame-time">Sin señal de video</p>
          </div>
        </article>

        <article class="panel wide reveal delay-3">
          <h3>Feed en Tiempo Real</h3>
          <div class="feed" id="event-feed"></div>
        </article>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
